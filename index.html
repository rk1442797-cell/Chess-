<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chess Game with Timer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <div>White: <span id="whiteScore">0</span></div>
        <div class="timer active" id="whiteTimer">10:00</div>
        <div>Turn: <span id="turn">White</span></div>
        <div class="timer" id="blackTimer">10:00</div>
        <div>Black: <span id="blackScore">0</span></div>
    </div>

    <div class="board">
        <table id="board">
            <tr>
                <td class="white">♜</td>
                <td class="black">♞</td>
                <td class="white">♝</td>
                <td class="black">♛</td>
                <td class="white">♚</td>
                <td class="black">♝</td>
                <td class="white">♞</td>
                <td class="black">♜</td>
            </tr>
            <tr>
                <td class="black">♟</td>
                <td class="white">♟</td>
                <td class="black">♟</td>
                <td class="white">♟</td>
                <td class="black">♟</td>
                <td class="white">♟</td>
                <td class="black">♟</td>
                <td class="white">♟</td>
            </tr>
            <tr>
                <td class="white"></td>
                <td class="black"></td>
                <td class="white"></td>
                <td class="black"></td>
                <td class="white"></td>
                <td class="black"></td>
                <td class="white"></td>
                <td class="black"></td>
            </tr>
            <tr>
                <td class="black"></td>
                <td class="white"></td>
                <td class="black"></td>
                <td class="white"></td>
                <td class="black"></td>
                <td class="white"></td>
                <td class="black"></td>
                <td class="white"></td>
            </tr>
            <tr>
                <td class="white"></td>
                <td class="black"></td>
                <td class="white"></td>
                <td class="black"></td>
                <td class="white"></td>
                <td class="black"></td>
                <td class="white"></td>
                <td class="black"></td>
            </tr>
            <tr>
                <td class="black"></td>
                <td class="white"></td>
                <td class="black"></td>
                <td class="white"></td>
                <td class="black"></td>
                <td class="white"></td>
                <td class="black"></td>
                <td class="white"></td>
            </tr>
            <tr>
                <td class="white">♙</td>
                <td class="black">♙</td>
                <td class="white">♙</td>
                <td class="black">♙</td>
                <td class="white">♙</td>
                <td class="black">♙</td>
                <td class="white">♙</td>
                <td class="black">♙</td>
            </tr>
            <tr>
                <td class="black">♖</td>
                <td class="white">♘</td>
                <td class="black">♗</td>
                <td class="white">♕</td>
                <td class="black">♔</td>
                <td class="white">♗</td>
                <td class="black">♘</td>
                <td class="white">♖</td>
            </tr>
        </table>
    </div>
    <footer>
        <b>Thanks for play the Game</b>
    </footer>

   <script src="script.js"></script>
</body>

</html>
